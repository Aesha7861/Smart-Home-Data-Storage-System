version: "3.8"

services:
  flask-app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5000:5000"  # Expose Flask app on port 5000
    volumes:
      - .:/app
    depends_on:
      - mysql
    networks:
      - app-network  # Ensure both services are in the same network

  mysql:
    image: mysql:latest
    container_name: mysql-container
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: smart_home
      MYSQL_USER: smart_user
      MYSQL_PASSWORD: root
    ports:
      - "3306:3306"  # Expose MySQL on port 3306
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - app-network

volumes:
  mysql_data:

networks:
  app-network:  # Define the shared network
